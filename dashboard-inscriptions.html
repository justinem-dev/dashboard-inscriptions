<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscriptions 2025 vs 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    header p {
      color: #6b7280;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .kpi-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .kpi {
      background: white;
      border-radius: 12px;
      padding: 20px 32px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      min-width: 160px;
    }

    .kpi .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .kpi .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .kpi.blue .value  { color: #3b82f6; }
    .kpi.green .value { color: #10b981; }
    .kpi.purple .value{ color: #8b5cf6; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      max-width: 900px;
      margin: 0 auto 24px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 20px;
    }

    #status {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #ef4444; }

    .evolution {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 4px;
    }

    .evolution.up   { color: #10b981; }
    .evolution.down { color: #ef4444; }
  </style>
</head>
<body>

<header>
  <h1>Inscriptions — 2025 vs 2026</h1>
  <p id="last-update">Chargement en cours…</p>
</header>

<div id="status">
  <div class="spinner"></div><br>
  Récupération des données Airtable…
</div>

<div id="content" style="display:none">
  <div class="kpi-row">
    <div class="kpi blue">
      <div class="label">Total 2025 (année)</div>
      <div class="value" id="total2025">—</div>
    </div>
    <div class="kpi green">
      <div class="label">Total 2026</div>
      <div class="value" id="total2026">—</div>
    </div>
    <div class="kpi purple">
      <div class="label">Évolution (Jan→mois en cours)</div>
      <div class="value" id="evolution">—</div>
      <div class="evolution" id="evolution-label"></div>
    </div>
  </div>

  <div class="card">
    <h2>Inscriptions par mois</h2>
    <canvas id="barChart" height="90"></canvas>
  </div>

  <div class="card">
    <h2>Cumul des inscriptions</h2>
    <canvas id="lineChart" height="90"></canvas>
  </div>
</div>

<script>
  const TOKEN   = 'REMPLACER_PAR_TON_TOKEN_AIRTABLE';
  const BASE_ID = 'app3GnMOzJn7VHMji';
  const TABLE_ID= 'tblTOJHEwCQhibcMM';
  const DATE_FIELD = 'Date de l\'email';

  const MONTHS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

  async function fetchAllRecords() {
    let records = [];
    let offset  = null;

    do {
      const params = new URLSearchParams({ pageSize: 100 });
      params.append('fields[]', DATE_FIELD);
      params.append('fields[]', 'Lien vers table Clés');
      if (offset) params.set('offset', offset);

      const res = await fetch(
        `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?${params}`,
        { headers: { Authorization: `Bearer ${TOKEN}` } }
      );

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `Erreur ${res.status}`);
      }

      const data = await res.json();
      records = records.concat(data.records);
      offset  = data.offset || null;
    } while (offset);

    return records;
  }

  function buildMonthly(records) {
    const counts = { 2025: Array(12).fill(0), 2026: Array(12).fill(0) };

    // Pour chaque clef unique, on garde uniquement la date la plus ancienne
    const earliest = new Map(); // clef → { year, month, date }

    records.forEach(r => {
      const raw  = r.fields?.[DATE_FIELD];
      const clef = r.fields?.['Lien vers table Clés'];
      if (!raw) return;

      const d    = new Date(raw);
      const key  = clef ? String(clef) : `_no_clef_${r.id}`; // sans clef = toujours unique

      if (!earliest.has(key) || d < earliest.get(key).date) {
        earliest.set(key, { year: d.getFullYear(), month: d.getMonth(), date: d });
      }
    });

    earliest.forEach(({ year, month }) => {
      if (counts[year]) counts[year][month]++;
    });

    return counts;
  }

  function buildCumul(monthly) {
    const cumul = {};
    for (const y of [2025, 2026]) {
      cumul[y] = [];
      let sum = 0;
      monthly[y].forEach(v => { sum += v; cumul[y].push(sum); });
    }
    return cumul;
  }

  function makeBarChart(monthly) {
    const ctx = document.getElementById('barChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: MONTHS,
        datasets: [
          {
            label: '2025',
            data: monthly[2025],
            backgroundColor: 'rgba(59,130,246,0.7)',
            borderRadius: 6,
          },
          {
            label: '2026',
            data: monthly[2026],
            backgroundColor: 'rgba(16,185,129,0.7)',
            borderRadius: 6,
          },
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'top' } },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0 } }
        }
      }
    });
  }

  function makeLineChart(cumul) {
    const ctx = document.getElementById('lineChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: MONTHS,
        datasets: [
          {
            label: '2025',
            data: cumul[2025],
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.1)',
            fill: true,
            tension: 0.35,
            pointRadius: 4,
          },
          {
            label: '2026',
            data: cumul[2026],
            borderColor: '#10b981',
            backgroundColor: 'rgba(16,185,129,0.1)',
            fill: true,
            tension: 0.35,
            pointRadius: 4,
          },
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'top' } },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0 } }
        }
      }
    });
  }

  async function init() {
    try {
      const records = await fetchAllRecords();
      const monthly = buildMonthly(records);
      const cumul   = buildCumul(monthly);

      // Dernier mois ayant des données en 2026
      const lastMonth2026 = monthly[2026].reduce((last, v, i) => v > 0 ? i : last, -1);
      const compareUpTo   = lastMonth2026 >= 0 ? lastMonth2026 : new Date().getMonth();

      const t2025full = monthly[2025].reduce((a,b) => a+b, 0);
      const t2026     = monthly[2026].reduce((a,b) => a+b, 0);
      // 2025 sur les mêmes mois que 2026
      const t2025comp = monthly[2025].slice(0, compareUpTo + 1).reduce((a,b) => a+b, 0);
      const pct       = t2025comp > 0 ? ((t2026 - t2025comp) / t2025comp * 100).toFixed(1) : '—';

      document.getElementById('total2025').textContent  = t2025full.toLocaleString('fr-FR');
      document.getElementById('total2026').textContent  = t2026.toLocaleString('fr-FR');

      const evEl  = document.getElementById('evolution');
      const evLbl = document.getElementById('evolution-label');
      if (t2025comp > 0) {
        const sign = pct > 0 ? '+' : '';
        evEl.textContent  = `${sign}${pct}%`;
        evLbl.textContent = t2026 >= t2025comp ? '↑ en hausse' : '↓ en baisse';
        evLbl.className   = `evolution ${t2026 >= t2025comp ? 'up' : 'down'}`;
      } else {
        evEl.textContent = '—';
      }

      document.getElementById('last-update').textContent =
        `${records.length} inscriptions chargées · mis à jour le ${new Date().toLocaleString('fr-FR')}`;

      document.getElementById('status').style.display  = 'none';
      document.getElementById('content').style.display = 'block';

      makeBarChart(monthly);
      makeLineChart(cumul);

    } catch (e) {
      document.getElementById('status').innerHTML =
        `<span class="error">Erreur : ${e.message}</span>`;
    }
  }

  init();
</script>
</body>
</html>
